<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Supabase Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="h-full bg-zinc-950 text-white flex items-center justify-center">
  <div class="max-w-md w-full mx-4 bg-zinc-900 p-8 rounded-3xl shadow-2xl">
    <h1 class="text-4xl font-bold text-center mb-2">Tell us anything!</h1>
    <p class="text-zinc-400 text-center mb-8">Your message goes straight to Supabase</p>

    <form id="form" class="space-y-6">
      <div>
        <label class="block text-sm font-medium mb-1">Your name</label>
        <input type="text" id="name" required
               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Email address</label>
        <input type="email" id="email" required
               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Your message</label>
        <textarea id="message" rows="5" required
                  class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-4 py-3 focus:outline-none focus:border-blue-500"></textarea>
      </div>

      <button type="submit"
              id="submitBtn"
              class="w-full bg-blue-600 hover:bg-blue-500 transition-colors text-white font-semibold py-4 rounded-3xl text-lg flex items-center justify-center">
        Send to Supabase
      </button>
    </form>

    <div id="status" class="mt-6 text-center text-sm hidden"></div>
  </div>

  <script>
    // ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←
    // REPLACE THESE TWO LINES WITH YOUR OWN VALUES FROM STEP 1
    const supabaseUrl = 'https://YOUR-PROJECT.supabase.co'
    const supabaseAnonKey = 'eyJ...your-anon-key-here...'
    // ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←

    const supabase = createClient(supabaseUrl, supabaseAnonKey)

    const form = document.getElementById('form')
    const status = document.getElementById('status')
    const submitBtn = document.getElementById('submitBtn')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      
      // Disable button while sending
      submitBtn.disabled = true
      submitBtn.innerHTML = `
        <svg class="animate-spin h-5 w-5 mr-2 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        Sending...
      `

      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value
      }

      const { error } = await supabase
        .from('submissions')
        .insert([data])

      if (error) {
        status.innerHTML = `<span class="text-red-400">Error: ${error.message}</span>`
        status.classList.remove('hidden')
      } else {
        status.innerHTML = `<span class="text-green-400">✅ Thank you! Your message is now in Supabase.</span>`
        status.classList.remove('hidden')
        form.reset()
      }

      // Reset button
      submitBtn.disabled = false
      submitBtn.innerHTML = 'Send to Supabase'
    })
  </script>
</body>
</html>
